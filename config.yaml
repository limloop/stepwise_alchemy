# =============================================================================
# StepWise Alchemy — глобальная конфигурация
# =============================================================================

# --- Логирование ---
logging:
  log_dir: "logs"
  log_level: "INFO"          # DEBUG, INFO, WARNING, ERROR
  console_level: "INFO"      # что видно в консоли
  file_level: "DEBUG"        # что пишется в файл (обычно детальнее)
  max_bytes: 10485760        # 10 MB на файл до ротации
  backup_count: 5            # хранить 5 ротированных файлов

# --- Кеширование ---
cache:
  root: "cache"              # корневая директория для кеша источников

# --- Параллелизм ---
processing:
  max_workers: 4             # количество потоков для параллельной обработки

# --- Очистка ---
cleaners:
  remove_python_code: true
  garbage_threshold: 0.7
  allowed_langs:
    - ru
    - en

# --- Источники ---
# Если секция пуста — используются все зарегистрированные источники.
# Чтобы включить/отключить конкретный источник:
sources:
  test_dialogue:
    enabled: true
  test_text:
    enabled: true
    quality_tier_override: 2   # переопределить качество (опционально)

# --- Сборка финального датасета (этап 3) ---
assembly:
  # --- Общие настройки ---
  output_dir: "output"
  tokenizer: "microsoft/Phi-3.5-mini-instruct"
  
  shuffle: true
  seed: 42
  
  max_total_tokens: null         # null = без ограничения
  
  # --- Режим chat (диалоги) ---
  chat:
    min_messages: 2
    max_tokens: 4096
    apply_chat_template: false   # true = сохранять токены, false = сохранять messages
  
  # --- Режим text (сплошной текст) ---
  text:
    chunk_sizes: [64, 128, 256, 512]   # размеры чанков в токенах
    stride: 448                         # перекрытие при нарезке
    min_tokens: 64                      # минимальная длина чанка
    chunking: "fixed"                   # "fixed" или "sentence"
  
  # --- Смешивание источников ---
  mixing:
    base_tier: 1
    sources:
      test_text:
        use_all: true